<style>
    /* GENEL TASARIM AYARLARI */
    body { margin: 0; background: #000; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; color: white; }
    
    #guest-grid { 
        width: 180px; height: 440px; position: absolute; top: 40px; left: 220px; 
        display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 2px; 
    }
    
    .slot { background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    
    /* BOŞ SLOT GÖRÜNÜMÜ */
    .plus-icon { color: #888; font-size: 32px; font-weight: 200; margin-bottom: 2px; }
    .req-text { color: #888; font-size: 11px; font-weight: 400; }

    /* ÜSTTEKİ PUAN ALANI (SİYAH HAP) */
    .slot-score { 
        position: absolute; top: 6px; left: 6px; 
        background: rgba(0, 0, 0, 0.6); border-radius: 20px; 
        padding: 2px 8px 2px 2px; display: flex; align-items: center; gap: 5px; 
        z-index: 5;
    }

    /* KRİSTAL YILDIZ BADGE */
    .diamond-icon {
        width: 15px; height: 15px; background: #fff; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.8); /* Dıştaki parlama halkası */
    }
    .diamond-icon::after {
        content: ''; width: 9px; height: 9px; background: #00f2ff;
        clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    }

    /* İNCE YAZI TİPİ */
    .slot-score span { 
        font-size: 10.5px; font-weight: 500; color: #fff; 
        letter-spacing: 0.2px; 
    }

    /* PROFİL FOTOĞRAFI */
    .guest-avatar { width: 58px; height: 58px; border-radius: 50%; object-fit: cover; border: 1px solid #222; }

    /* ALTTAKİ İSİM VE ARTI BUTONU */
    .info-pill {
        position: absolute; bottom: 8px; left: 6px; 
        background: rgba(0, 0, 0, 0.5); border-radius: 15px; 
        padding: 2px 2px 2px 8px; display: flex; align-items: center; gap: 4px;
        max-width: 65px; height: 19px;
    }
    .guest-name { 
        font-size: 9px; font-weight: 500; color: #fff; 
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-transform: none;
    }
    .mini-plus-circle { 
        width: 15px; height: 15px; background: rgba(255, 255, 255, 0.2); 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
    }
    .mini-plus { font-size: 10px; font-weight: bold; color: #fff; line-height: 1; }

    /* MİKROFON BUTONU */
    .mic-pill { 
        position: absolute; bottom: 8px; right: 8px; 
        width: 19px; height: 19px; background: rgba(0, 0, 0, 0.5); 
        border-radius: 50%; display: flex; align-items: center; justify-content: center; 
    }
    .mic-pill svg { width: 11px; height: 11px; fill: #fff; opacity: 0.9; }
</style>

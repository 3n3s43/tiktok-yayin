<style>
    /* BÜYÜTME/KÜÇÜLTME İÇİN GEREKLİ AYARLAR */
    .resizable { 
        position: absolute; 
        overflow: hidden; 
    }
    
    /* Filippo düzenindeki mavi çerçeve */
    #host-cam { 
        width: 400px; 
        height: 600px; 
        border: 4px solid #3498db; 
        background: #000; 
        display: flex;
        align-items: center;
        justify-content: center;
    }

    /* Kamera kutusunun içindeki resim/video ayarı */
    #host-cam img, #host-cam video {
        width: 100%;
        height: 100%;
        object-fit: cover;
        pointer-events: none;
    }

    /* Düzenleme modunda çıkan o meşhur kesikli çizgiler */
    .edit-active { 
        border: 2px dashed #00f2ea !important; 
        z-index: 999;
    }

    /* Resizable tutamaçlarını görünür yapalım */
    .ui-resizable-handle { background: #00f2ea; width: 10px; height: 10px; }
</style>

<div id="canvas">
    <div id="host-cam" class="draggable resizable">
        <img src="3333.jpeg" id="host-placeholder">
    </div>

    <div id="guest-container" class="draggable">
        </div>
</div>

<script>
    $(function() {
        // Hem sürükleme hem boyutlandırmayı başlat ama başlangıçta kapat
        $(".draggable").draggable({ containment: "#canvas" }).draggable("disable");
        
        // ASPACT RATIO: True yaparak görüntünün bozulmadan büyümesini sağlıyoruz
        $(".resizable").resizable({ 
            aspectRatio: true, 
            handles: "all",
            containment: "#canvas" 
        }).resizable("disable");
    });

    socket.on('toggle_edit', (data) => {
        if(data.status) {
            $(".draggable").draggable("enable").addClass("edit-active");
            $(".resizable").resizable("enable"); // BÜYÜTME AKTİF
        } else {
            $(".draggable").draggable("disable").removeClass("edit-active");
            $(".resizable").resizable("disable"); // BÜYÜTME KAPALI
        }
    });
</script>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - TikTok Reji Edition</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #canvas { width: 100vw; height: 100vh; position: relative; }

        .sync-box {
            width: 200px; height: 550px; 
            position: absolute; top: 15%; 
        }

        /* ✅ HOST KAMERA / RESİM ALANI */
        #host-cam { 
            left: calc(50% - 205px); 
            border: 2px solid rgba(52, 152, 219, 0.6); 
            background: #000; border-radius: 8px; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        #host-cam img, #host-cam video { width: 100%; height: 100%; object-fit: cover; position: absolute; }
        
        /* Kamera ve Resim Butonları (Sadece Edit Modunda Görünür) */
        .host-controls {
            z-index: 10; display: none; flex-direction: column; gap: 10px;
        }
        .host-btn {
            background: rgba(0, 242, 234, 0.8); border: none; padding: 5px 10px;
            border-radius: 4px; font-size: 10px; font-weight: bold; cursor: pointer;
        }

        /* ✅ 8'Lİ SİYAH REQUEST KUTUCUKLARI */
        #guest-grid { 
            left: calc(50% + 5px); 
            display: grid; grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(4, 1fr); gap: 4px; 
        }
        .slot {
            background: #000 !important; /* Tam siyah */
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 6px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
        }
        .plus-icon { color: #333; font-size: 20px; }
        .req-text { color: #fff; font-size: 9px; margin-top: 2px; font-weight: bold; text-transform: uppercase; }

        /* ✅ ASLAN KATMANI */
        #lion-overlay { 
            position: absolute; top: 10%; left: 50%; transform: translateX(-50%);
            width: 500px; display: none; z-index: 10000; 
            filter: drop-shadow(0 0 30px rgba(255, 165, 0, 0.6));
        }
        #lion-vid { width: 100%; height: auto; }

        .edit-active { border: 2px dashed #00f2ea !important; z-index: 999; }
        .edit-active .host-controls { display: flex; }
        .ui-resizable-handle { background: #00f2ea; width: 10px; height: 10px; border-radius: 50%; }
        .guest-avatar { width: 70%; border-radius: 50%; border: 2px solid #00f2ea; }
    </style>
</head>

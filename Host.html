<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Host</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; position: relative; }
        
        /* Draggable/Resizable Temel Yapı */
        #host-cam { width: 230px; height: 440px; position: absolute; top: 40px; left: 15px; border: 1px solid #3498db; border-radius: 4px; overflow: hidden; background: #111; }
        #host-cam img { width: 100%; height: 100%; object-fit: cover; }
        #guest-grid { width: 180px; height: 440px; position: absolute; top: 40px; left: 250px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 4px; }
        
        /* Slot ve Request Görünümü */
        .slot { background: rgba(255, 255, 255, 0.05); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 4px; }
        .plus-icon { color: #888; font-size: 24px; margin-bottom: 2px; }
        .req-text { color: #888; font-size: 11px; font-weight: 500; }

        /* DOLU KOLTUK TASARIMI (ttt.png baz alındı) */
        .slot-score { 
            position: absolute; top: 4px; left: 4px;
            font-size: 10px; font-weight: bold; 
            display: flex; align-items: center; gap: 4px; 
            background: rgba(0,0,0,0.5); border-radius: 12px; 
            padding: 2px 8px; color: #fff; z-index: 5;
        }
        .diamond-icon { width: 12px; height: 12px; background: #00f2ea; border-radius: 50%; box-shadow: 0 0 5px #00f2ea; }

        .guest-avatar { width: 55px; height: 55px; border-radius: 50%; object-fit: cover; margin-top: 5px; }

        /* Alt Bilgi Barı (İsim + Plus) */
        .bottom-info {
            position: absolute; bottom: 8px; left: 6px;
            display: flex; align-items: center;
            background: rgba(0,0,0,0.6); border-radius: 12px;
            padding: 2px 8px; max-width: 65%;
        }
        .guest-name { font-size: 10px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .mini-plus { font-size: 12px; font-weight: bold; margin-left: 5px; color: #ccc; }

        /* Mikrofon Simgesi */
        .mic-badge {
            position: absolute; bottom: 8px; right: 6px;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.6); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-badge svg { width: 12px; height: 12px; fill: #eee; }

        /* Aslan ve Düzenleme */
        #lion-overlay { position: absolute; top: 50px; left: 50px; width: 300px; height: 300px; display: none; z-index: 9999; }
        #lion-vid { width: 100%; height: 100%; object-fit: contain; }
        .edit-active { border: 2px dashed #00f2ea !important; z-index: 1000; }
        .lion-edit-view { display: block !important; border: 2px dashed orange !important; opacity: 0.5; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable resizable"><img src="3333.jpeg"></div>
    <div id="guest-grid" class="draggable resizable"></div>
    <div id="lion-overlay" class="draggable resizable">
        <video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    const socket = io();
    const slotScores = Array(8).fill(0);
    const grid = document.getElementById('guest-grid');
    const emptyHtml = `<div class="plus-icon">+</div><div class="req-text">Request</div>`;

    for(let i=0; i<8; i++) { grid.innerHTML += `<div class="slot" id="slot${i}">${emptyHtml}</div>`; }

    $(function() {
        $(".draggable").draggable().draggable("disable");
        $(".resizable").resizable().resizable("disable");
    });

    socket.on('execute_visual', (data) => {
        if (data.action === 'lion_trigger') {
            const v = document.getElementById('lion-vid');
            $("#lion-overlay").show();
            v.currentTime = 0; v.muted = false; v.play();
            slotScores[data.slot] += 29999;
            $(`#slot${data.slot} .slot-score span`).text((slotScores[data.slot]/1000).toFixed(1) + "K");
            v.onended = () => { if (!$(".draggable").hasClass("edit-active")) $("#lion-overlay").hide(); };
        }

        if (data.action === 'manage_slot') {
            const el = document.getElementById("slot" + data.slot);
            if (data.name) {
                // ttt.png'deki birebir görsel yapı
                el.innerHTML = `
                    <div class="slot-score"><div class="diamond-icon"></div><span>0.0K</span></div>
                    <img src="${data.avatar}" class="guest-avatar">
                    <div class="bottom-info">
                        <div class="guest-name">${data.name.toUpperCase()}</div>
                        <div class="mini-plus">+</div>
                    </div>
                    <div class="mic-badge">
                        <svg viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/><path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
                    </div>`;
            } else { el.innerHTML = emptyHtml; }
        }
    });

    socket.on('toggle_edit', (data) => {
        const s = data.status ? "enable" : "disable";
        $(".draggable").draggable(s).toggleClass("edit-active", data.status);
        $(".resizable").resizable(s);
        if(data.status) $("#lion-overlay").addClass("lion-edit-view");
        else $("#lion-overlay").removeClass("lion-edit-view").hide();
    });

    $(document).on('click', () => { document.getElementById('lion-vid').muted = false; });
</script>
</body>
</html>

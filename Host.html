<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="referrer" content="no-referrer">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; }
        #guest-grid { width: 180px; height: 440px; position: absolute; top: 40px; left: 220px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 2px; }
        .slot { background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden; }
        .plus-icon { color: #444; font-size: 32px; }
        .req-text { color: #444; font-size: 11px; }
        .slot-score { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); border-radius: 20px; padding: 2px 8px; display: flex; align-items: center; gap: 5px; z-index: 5; }
        .score-val { font-size: 10px; color: #fff; font-weight: 600; }
        .guest-avatar { width: 58px; height: 58px; border-radius: 50%; border: 1.5px solid #333; object-fit: cover; background: #1a1a1a; display: block; }
        .info-pill { position: absolute; bottom: 8px; left: 6px; background: rgba(0,0,0,0.8); border-radius: 15px; padding: 2px 8px; display: flex; align-items: center; height: 19px; max-width: 85%; overflow: hidden; }
        .guest-name { font-size: 9px; color: #fff; font-weight: 600; white-space: nowrap; font-family: 'Segoe UI Emoji', sans-serif; }
    </style>
</head>
<body>
    <div id="guest-grid"></div>
    <script>
        const socket = io();
        let slotData = Array(8).fill(null).map(() => ({ score: 0, name: null }));

        for(let i=0; i<8; i++) {
            $('#guest-grid').append(`<div class="slot" id="slot-${i}"><div class="plus-icon">+</div><div class="req-text">Request</div></div>`);
        }

        socket.on('execute_visual', (data) => {
            const el = $(`#slot-${data.slot}`);
            if(data.action === 'manage_slot') {
                if(data.name && data.name !== "null") {
                    slotData[data.slot].name = data.name;
                    slotData[data.slot].score = 0;
                    
                    // 🔥 ÇİFT KATMANLI PROXY SİSTEMİ
                    // Önce Weserv tüneli (Hızlı), hata verirse Google Proxy (Güçlü)
                    let avatarUrl = data.avatar;
                    if(avatarUrl) {
                        avatarUrl = `https://images.weserv.nl/?url=${encodeURIComponent(avatarUrl)}&w=150&h=150&fit=cover&n=-1`;
                    }

                    el.html(`
                        <div class="slot-score"><span class="score-val" id="score-${data.slot}">0</span></div>
                        <img src="${avatarUrl}" class="guest-avatar" onerror="this.src='https://images1-focus-opensocial.googleusercontent.com/gadgets/proxy?container=focus&refresh=2592000&url=${encodeURIComponent(data.avatar)}'">
                        <div class="info-pill"><span class="guest-name">${data.name}</span></div>
                    `);
                } else {
                    slotData[data.slot].name = null;
                    el.html(`<div class="plus-icon">+</div><div class="req-text">Request</div>`);
                }
            }
            if(data.action === 'gift_trigger' && slotData[data.slot].name) {
                slotData[data.slot].score += Number(data.value || 0);
                let total = slotData[data.slot].score;
                $(`#score-${data.slot}`).text(total >= 1000 ? (total/1000).toFixed(1) + 'K' : total);
            }
        });
    </script>
</body>
</html>

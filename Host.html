<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Host</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; position: relative; }
        
        #host-cam { 
            width: 200px; height: 440px; position: absolute; top: 40px; left: 15px; 
            border: 1.5px solid #3498db; border-radius: 4px; overflow: hidden; background: #111; z-index: 10; 
        }
        #host-cam img { width: 100%; height: 100%; object-fit: cover; }
        
        #guest-grid { 
            width: 180px; height: 440px; position: absolute; top: 40px; left: 220px; 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 0; 
        }
        
        .slot { background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plus-icon { color: #555; font-size: 28px; font-weight: 200; }
        .req-text { color: #666; font-size: 10.5px; margin-top: -2px; font-weight: 500; }

        /* PUAN ALANI VE İNCE FONT */
        .slot-score { 
            position: absolute; top: 7px; left: 7px; 
            font-size: 10.5px; font-weight: 500; 
            display: flex; align-items: center; gap: 4px; 
            background: rgba(0,0,0,0.5); border-radius: 14px; 
            padding: 2px 9px 2px 2px; color: #fff; z-index: 5;
            letter-spacing: -0.1px;
        }

        /* BEYAZ DAİRE İÇİNDE TİKTOK KRİSTAL YILDIZ */
        .diamond-icon {
            width: 16px; height: 16px;
            background: #ffffff; /* Net Beyaz Daire */
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 4px rgba(255, 255, 255, 0.4);
        }

        /* DOLGUN KRİSTAL YILDIZ (Davut Yıldızı Değil) */
        .diamond-icon::after {
            content: '';
            width: 10px; height: 10px;
            background: #00e5ff; /* Turkuaz Parlak Yıldız */
            /* TikTok Yıldız Formu Clip-Path */
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            filter: drop-shadow(0 0 1px rgba(0, 229, 255, 0.8));
        }

        .guest-avatar { width: 54px; height: 54px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; }

        .info-pill {
            position: absolute; bottom: 10px; left: 6px; display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.6); border-radius: 12px; padding: 0 4px 0 8px; width: 66px; height: 21px; 
        }
        .guest-name { font-size: 8.5px; font-weight: 600; color: #eee; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
        .mini-plus-circle { width: 14px; height: 14px; background: rgba(255,255,255,0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .mini-plus { font-size: 11px; font-weight: bold; color: #fff; }
        .mic-pill { position: absolute; bottom: 10px; right: 6px; width: 21px; height: 21px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .mic-pill svg { width: 13px; height: 13px; fill: #fff; }

        #lion-overlay { position: absolute; top: 50px; left: 50px; width: 320px; height: 320px; display: none; z-index: 9999; }
        #lion-vid { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>
    <div id="canvas">
        <div id="host-cam"><img src="3333.jpeg"></div>
        <div id="guest-grid"></div>
        <div id="lion-overlay"><video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video></div>
    </div>

<script>
    const socket = io();
    const slotScores = Array(8).fill(0);
    const grid = document.getElementById('guest-grid');
    const emptyHtml = `<div class="plus-icon">+</div><div class="req-text">Request</div>`;

    for(let i=0; i<8; i++) { grid.innerHTML += `<div class="slot" id="slot${i}">${emptyHtml}</div>`; }

    socket.on('apply_cam_settings', (data) => {
        $('#host-cam').css({ 'width': data.w+'px', 'height': data.h+'px', 'left': data.x+'px', 'top': data.y+'px' });
        $('#guest-grid').css({ 'left': (parseInt(data.x) + parseInt(data.w) + 5) + 'px', 'top': data.y + 'px', 'height': data.h + 'px' });
    });

    socket.on('execute_visual', (data) => {
        const slotId = data.slot;
        const scoreSpan = $(`#slot${slotId} .slot-score span`);
        const oldScore = slotScores[slotId];

        if (data.action === 'gift_trigger') {
            if (data.gift_type === 'small') { slotScores[slotId] += data.value; } 
            else if (data.gift_type === 'lion') {
                slotScores[slotId] += 29999;
                const v = document.getElementById('lion-vid');
                $("#lion-overlay").show(); v.currentTime = 0; v.muted = false; v.play();
                v.onended = () => { $("#lion-overlay").hide(); };
            }
            animateValue(scoreSpan, oldScore, slotScores[slotId], 1000);
        }

        if (data.action === 'manage_slot') {
            const el = document.getElementById("slot" + data.slot);
            if (data.name) {
                el.innerHTML = `<div class="slot-score"><div class="diamond-icon"></div><span>0</span></div><img src="${data.avatar}" class="guest-avatar"><div class="info-pill"><div class="guest-name">${data.name.toUpperCase()}</div><div class="mini-plus-circle"><span class="mini-plus">+</span></div></div><div class="mic-pill"><svg viewBox="0 0 24 24"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.17l5.98 6zm-1.15 5.18l-1.02-1.02c-.52.42-1.15.67-1.81.67-1.66 0-3-1.34-3-3h-2c0 2.49 1.81 4.58 4.21 4.91V21h2v-2.09c.65-.09 1.28-.3 1.85-.62l-1.23-1.23zm-9.35-12.2l1.27-1.27 15.89 15.89-1.27 1.27L4.48 4.15z"/></svg></div>`;
            } else { el.innerHTML = emptyHtml; slotScores[data.slot] = 0; }
        }
    });

    function animateValue(obj, start, end, duration) {
        let startTimestamp = null;
        const step = (timestamp) => {
            if (!startTimestamp) startTimestamp = timestamp;
            const progress = Math.min((timestamp - startTimestamp) / duration, 1);
            const current = Math.floor(progress * (end - start) + start);
            // 29.999K FORMATI
            if (current >= 1000) { obj.text((current / 1000).toFixed(3).replace('.', ',') + "K"); } 
            else { obj.text(current); }
            if (progress < 1) window.requestAnimationFrame(step);
        };
        window.requestAnimationFrame(step);
    }
</script>
</body>
</html>

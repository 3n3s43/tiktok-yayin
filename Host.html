<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; }
        #canvas { width: 100vw; height: 100vh; position: relative; }

        /* HOST KAMERASI - BÜYÜTÜLEBİLİR */
        #host-cam { 
            width: 400px; height: 700px; 
            border: 3px solid #3498db; 
            position: absolute; top: 20px; left: 20px;
            background: #111; overflow: hidden;
        }
        #host-cam img { width: 100%; height: 100%; object-fit: cover; }

        /* 8'Lİ REQUEST BLOĞU - DAHA KÜÇÜK VE BİRLEŞİK */
        #guest-grid { 
            position: absolute; top: 20px; right: 20px;
            display: grid; grid-template-columns: 1fr 1fr; 
            gap: 2px; /* Kutular arası boşluğu 2px'e düşürdüm */
            width: 280px; /* Genişliği 340'tan 280'e çektim ki sığsın */
        }

        .slot {
            background: rgba(15, 15, 15, 0.95); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 4px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; aspect-ratio: 1/1;
        }

        .plus-icon { color: #fff; font-size: 22px; opacity: 0.4; }
        .request-text { color: #fff; font-size: 10px; margin-top: 2px; opacity: 0.5; }

        /* ASLAN KUTUSU */
        #lion-overlay { 
            position: absolute; top: 25%; left: 25%; 
            width: 500px; display: none; z-index: 10000; 
        }
        #lion-vid { width: 100%; height: auto; }

        /* EDİT MODU ÇİZGİLERİ */
        .edit-active { border: 2px dashed #00f2ea !important; z-index: 999; }
        .ui-resizable-handle { background: #00f2ea; width: 12px; height: 12px; border-radius: 50%; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable resizable"><img src="3333.jpeg"></div>

    <div id="guest-grid" class="draggable resizable">
        <div class="slot" id="slot0"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot1"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot2"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot3"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot4"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot5"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot6"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot7"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
    </div>

    <div id="lion-overlay" class="draggable resizable">
        <video id="lion-vid"><source src="aslan.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    const socket = io();
    
    $(function() {
        $(".draggable").draggable({ containment: "#canvas" }).draggable("disable");
        $(".resizable").resizable({ 
            aspectRatio: true, 
            handles: "all",
            containment: "#canvas" 
        }).resizable("disable");
    });

    socket.on('toggle_edit', (data) => {
        if(data.status) {
            $(".draggable").draggable("enable").addClass("edit-active");
            $(".resizable").resizable("enable");
            $("#lion-overlay").show().css("background", "rgba(255,165,0,0.1)"); 
        } else {
            $(".draggable").draggable("disable").removeClass("edit-active");
            $(".resizable").resizable("disable");
            $("#lion-overlay").hide().css("background", "transparent");
        }
    });

    // ASLAN VE SLOT YÖNETİMİ
    socket.on('execute_visual', (data) => {
        if (data.action === 'lion_effect' || data.action === 'lion_trigger') {
            $("#lion-overlay").fadeIn();
            const v = document.getElementById('lion-vid');
            v.play();
            v.onended = () => { if(!$(".draggable").hasClass('edit-active')) $("#lion-overlay").fadeOut(); };
        }
        
        const slotId = "slot" + data.slot;
        const el = document.getElementById(slotId);
        if (data.action === 'manage_slot' && el) {
            if (data.name) {
                el.innerHTML = `<img src="${data.avatar}" style="width:60%; border-radius:50%; border:2px solid #00f2ea;"><div style="color:white; font-size:10px; margin-top:4px;">${data.name}</div>`;
            } else {
                el.innerHTML = `<span class="plus-icon">+</span><span class="request-text">Request</span>`;
            }
        }
    });
</script>
</body>
</html>

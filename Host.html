<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        /* GENEL AYARLAR (FULL HD DÜZEN) */
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #canvas { width: 100vw; height: 100vh; position: relative; }

        /* HOST KAMERASI (Sol Taraf) */
        #host-cam { 
            width: 480px; height: 850px; /* Filippo gibi uzun */
            border: 3px solid #3498db; 
            position: absolute; top: 20px; left: 20px;
            overflow: hidden; background: #111;
        }
        #host-cam img { width: 100%; height: 100%; object-fit: cover; }

        /* GUEST KUTULARI KONTEYNERİ (Sağ Taraf) */
        #guest-side {
            position: absolute; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
        }

        /* ÜSTTEKİ 6 KUTU (3x2 Düzen) */
        #top-six {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 360px;
        }

        /* ALTTAKİ 2 KUTU (Yan Yana) */
        #bottom-two {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; width: 360px;
        }

        /* ORTAK KUTU STİLİ (HD Kalite ve İdeal Boyut) */
        .slot { 
            aspect-ratio: 1/1; /* Tam kare kutular */
            background: rgba(25, 25, 25, 0.95); /* Filippo'nun koyu teması */
            border: 1px solid rgba(255, 255, 255, 0.1); /* İnce HD çizgi */
            border-radius: 6px; display: flex; flex-direction: column; 
            align-items: center; justify-content: center;
        }

        /* YAZI STİLLERİ */
        .req-text { font-size: 14px; color: #777; margin-top: 8px; font-weight: 500; text-transform: capitalize; }
        .plus-icon { font-size: 32px; color: #444; font-weight: 100; }

        /* EDİT MODU ÇİZGİLERİ */
        .edit-active { border: 2px dashed #00f2ea !important; }
        .ui-resizable-handle { background: #00f2ea; width: 12px; height: 12px; border-radius: 50%; }

        /* PUAN VE PROFİL */
        .score-badge { position: absolute; top: 8px; left: 8px; font-size: 12px; color: white; background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 10px; }
        .guest-avatar { width: 65%; border-radius: 50%; border: 2px solid #00f2ea; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable resizable">
        <img src="3333.jpeg">
    </div>

    <div id="guest-side" class="draggable resizable">
        <div id="top-six">
            <div id="slot0" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
            <div id="slot1" class="slot"><div class="plus-icon">+</span><div class="req-text">Request</div></div>
            <div id="slot2" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
            <div id="slot3" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
            <div id="slot4" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
            <div id="slot5" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
        </div>
        <div id="bottom-two">
            <div id="slot6" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
            <div id="slot7" class="slot"><div class="plus-icon">+</div><div class="req-text">Request</div></div>
        </div>
    </div>
</div>

<script>
    const socket = io(); // Render bağlantısı

    $(function() {
        $(".draggable").draggable({ containment: "#canvas" }).draggable("disable");
        $(".resizable").resizable({ aspectRatio: true, handles: "all" }).resizable("disable");
    });

    socket.on('toggle_edit', (data) => {
        if(data.status) {
            $(".draggable").draggable("enable").addClass("edit-active");
            $(".resizable").resizable("enable");
        } else {
            $(".draggable").draggable("disable").removeClass("edit-active");
            $(".resizable").resizable("disable");
        }
    });

    socket.on('update_host', (data) => {
        const el = $(`#slot${data.slot}`);
        if(data.user) {
            el.html(`
                <div class="score-badge">0.0K</div>
                <img src="${data.user.avatar}" class="guest-avatar">
                <div style="color:white; font-size:12px; margin-top:5px;">${data.user.name}</div>
            `);
        } else {
            el.html(`<div class="plus-icon">+</div><div class="req-text">Request</div>`);
        }
    });
</script>
</body>
</html>

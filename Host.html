<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Host</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; position: relative; }
        
        /* Host Kamera */
        #host-cam { width: 230px; height: 440px; position: absolute; top: 40px; left: 15px; border: 1px solid #3498db; border-radius: 2px; overflow: hidden; background: #111; }
        #host-cam img, #host-cam video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Misafir Grid */
        #guest-grid { width: 170px; height: 440px; position: absolute; top: 40px; left: 245px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 2px; }
        
        /* Slot Genel Yapı */
        .slot { background: rgba(255, 255, 255, 0.05); position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Boş Slot Görünümü */
        .plus-icon { color: #ffffff; font-size: 20px; font-weight: 300; opacity: 0.6; }
        .req-text { color: #ffffff; font-size: 10px; font-weight: 400; opacity: 0.5; margin-top: -2px; }
        
        /* Dolu Slot Tasarımı (Görsele Göre) */
        .slot-score { position: absolute; top: 2px; left: 5px; font-size: 9px; font-weight: bold; display: flex; align-items: center; gap: 2px; background: rgba(0,0,0,0.6); border-radius: 10px; padding: 1px 6px; color: #fff; z-index: 5; border: 0.5px solid rgba(255,255,255,0.2); }
        .guest-avatar { width: 65%; height: 65%; border-radius: 50%; border: 1px solid #fff; object-fit: cover; margin-bottom: 2px; }
        
        /* İsim Kutusu ve Yanındaki + Butonu */
        .name-container { display: flex; align-items: center; gap: 3px; background: rgba(0,0,0,0.5); padding: 1px 5px; border-radius: 10px; max-width: 90%; }
        .guest-name { font-size: 8px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 40px; opacity: 0.9; }
        .mini-plus { font-size: 10px; font-weight: bold; color: #fff; }
        
        /* Mikrofon Simgesi */
        .mic-icon { position: absolute; bottom: 4px; right: 4px; width: 14px; height: 14px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 8px; border: 0.5px solid rgba(255,255,255,0.3); }

        /* Aslan Katmanı (Artık Taşınabilir ve Boyutlanabilir) */
        #lion-overlay { position: absolute; top: 50px; left: 50px; width: 300px; height: 300px; display: none; z-index: 9999; }
        #lion-vid { width: 100%; height: 100%; object-fit: contain; }
        
        /* Düzenleme Modu Aktifken */
        .edit-active { border: 2px dashed #00f2ea !important; z-index: 1000; pointer-events: auto !important; }
        .lion-edit-view { display: block !important; border: 2px dashed orange !important; opacity: 0.5; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable resizable"><img id="host-img" src="3333.jpeg"></div>
    <div id="guest-grid" class="draggable resizable"></div>
    <div id="lion-overlay" class="draggable resizable">
        <video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    const socket = io();
    const slotScores = Array(8).fill(0);
    const grid = document.getElementById('guest-grid');
    const emptyHtml = `<div class="plus-icon">+</div><div class="req-text">Request</div>`;

    // Grid Oluşturma
    for(let i=0; i<8; i++) { grid.innerHTML += `<div class="slot" id="slot${i}">${emptyHtml}</div>`; }

    $(function() {
        $(".draggable").draggable().draggable("disable");
        $(".resizable").resizable().resizable("disable");
    });

    socket.on('execute_visual', (data) => {
        // ASLAN TETİKLEME
        if (data.action === 'lion_trigger') {
            const v = document.getElementById('lion-vid');
            $("#lion-overlay").show();
            v.currentTime = 0; v.muted = false; v.play();
            
            slotScores[data.slot] += 29999;
            $(`#slot${data.slot} .slot-score span`).text((slotScores[data.slot]/1000).toFixed(1) + "K");
            
            v.onended = () => { 
                // Eğer edit modu açık değilse gizle
                if (!$(".draggable").hasClass("edit-active")) {
                    $("#lion-overlay").hide(); 
                }
            };
        }

        // SLOT YÖNETİMİ (Görsele Uygun Tasarım)
        if (data.action === 'manage_slot') {
            const el = document.getElementById("slot" + data.slot);
            if (data.name) {
                el.innerHTML = `
                    <div class="slot-score">💎 <span>0.0K</span></div>
                    <img src="${data.avatar}" class="guest-avatar">
                    <div class="name-container">
                        <div class="guest-name">${data.name}</div>
                        <div class="mini-plus">+</div>
                    </div>
                    <div class="mic-icon">🎙️</div>`;
                slotScores[data.slot] = 0;
            } else { 
                el.innerHTML = emptyHtml; 
            }
        }
    });

    // DÜZENLEME MODU
    socket.on('toggle_edit', (data) => {
        const s = data.status ? "enable" : "disable";
        $(".draggable").draggable(s).toggleClass("edit-active", data.status);
        $(".resizable").resizable(s);

        // Edit modu açıkken aslanın yerini görebilmek için yarı şeffaf göster
        if(data.status) {
            $("#lion-overlay").addClass("lion-edit-view");
        } else {
            $("#lion-overlay").removeClass("lion-edit-view").hide();
        }
    });

    $(document).on('click', () => { document.getElementById('lion-vid').muted = false; });
</script>
</body>
</html>

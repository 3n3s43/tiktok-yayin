<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Multi-Slot Counters</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; width: 100vw; height: 100vh; color: white; }
        #canvas { width: 100%; height: 100%; position: relative; }

        /* HOST KAMERA */
        #host-cam { 
            width: 230px; height: 440px; position: absolute; top: 40px; left: 15px;
            border: 1px solid #3498db; border-radius: 2px; overflow: hidden;
        }
        #host-cam img, #host-cam video { width: 100%; height: 100%; object-fit: cover; }

        /* 8'Lİ REQUEST GRİD */
        #guest-grid { 
            width: 170px; height: 440px; position: absolute; top: 40px; left: 245px; 
            display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 2px; 
        }
        
        .slot { 
            background: rgba(255, 255, 255, 0.05); position: relative;
            display: flex; flex-direction: column; align-items: center; justify-content: center; overflow: hidden;
        }

        /* SLOT PUAN SAYACI */
        .slot-score {
            position: absolute; top: 2px; left: 5px; font-size: 10px; font-weight: bold;
            display: flex; align-items: center; gap: 2px; background: rgba(0,0,0,0.4); border-radius: 10px; padding: 1px 5px;
        }
        .score-icon { color: #00f2ea; font-size: 8px; }

        .plus-icon { color: #ffffff; font-size: 20px; opacity: 0.5; }
        .req-text { color: #ffffff; font-size: 10px; opacity: 0.4; }
        .guest-avatar { width: 70%; height: 70%; border-radius: 50%; border: 1.5px solid #fff; object-fit: cover; margin-top: 10px; }
        .guest-name { font-size: 9px; margin-top: 2px; opacity: 0.8; }

        /* ASLAN */
        #lion-overlay { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 500px; display: none; z-index: 9999; pointer-events: none; }
        #lion-vid { width: 100%; height: auto; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable resizable">
        <img id="host-img" src="3333.jpeg">
        <video id="webcam" autoplay playsinline style="display:none;"></video>
    </div>

    <div id="guest-grid" class="draggable resizable">
        </div>

    <div id="lion-overlay"><video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video></div>
</div>

<script>
    const socket = io({ transports: ['websocket'] });
    const slotScores = Array(8).fill(0); // Her slotun puanını tutar

    // Slotları Oluştur
    const grid = document.getElementById('guest-grid');
    for(let i=0; i<8; i++) {
        grid.innerHTML += `
            <div class="slot" id="slot${i}">
                <div class="plus-icon">+</div><div class="req-text">Request</div>
            </div>`;
    }

    socket.on('execute_visual', (data) => {
        // ASLAN VE PUAN TETİKLEME
        if (data.action === 'lion_trigger') {
            const slotIdx = data.slot;
            const v = document.getElementById('lion-vid');
            $("#lion-overlay").fadeIn(200);
            v.currentTime = 0;
            v.play();
            
            // Sadece ilgili slotun puanını artır
            slotScores[slotIdx] += 29999;
            const scoreDisplay = (slotScores[slotIdx] / 1000).toFixed(1) + "K";
            $(`#slot${slotIdx} .slot-score span`).text(scoreDisplay);

            v.onended = () => $("#lion-overlay").fadeOut(300);
        }

        // KULLANICI OTURTMA
        if (data.action === 'manage_slot') {
            const el = document.getElementById("slot" + data.slot);
            if (data.name) {
                el.innerHTML = `
                    <div class="slot-score"><span class="score-icon">●</span> <span>0.0K</span></div>
                    <img src="${data.avatar}" class="guest-avatar">
                    <div class="guest-name">${data.name}</div>`;
                slotScores[data.slot] = 0; // Yeni oturanda puanı sıfırla
            } else {
                el.innerHTML = `<div class="plus-icon">+</div><div class="req-text">Request</div>`;
            }
        }
    });

    $(document).on('click', () => { document.getElementById('lion-vid').muted = false; });
</script>
</body>
</html>

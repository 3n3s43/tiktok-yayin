<style>
    /* 8'li Koltuk Grubu - Adamın sistemindeki gibi yan yana 2'li */
    #guest-container {
        display: grid;
        grid-template-columns: 1fr 1fr; /* 2 Sütun */
        gap: 2px; /* Kutular arasındaki o ince çizgi */
        width: 300px; /* Toplam genişlik */
        background: #0b0d11;
        padding: 2px;
    }

    .slot { 
        aspect-ratio: 1 / 1; /* Kare koltuklar */
        background: #1c2026; 
        display: flex; flex-direction: column; 
        align-items: center; justify-content: center;
        border: 1px solid #0b0d11;
    }

    /* İSTEDİĞİN YAZI AYARI: Büyük değil, küçük ve şık */
    .req-text { 
        font-size: 13px; 
        color: #fff; 
        opacity: 0.5; 
        margin-top: 5px;
        text-transform: capitalize; /* Sadece baş harfi büyük: Request */
        font-weight: 400;
    }

    .plus-icon { 
        font-size: 30px; 
        color: #fff; 
        opacity: 0.5; 
        font-weight: 100; 
    }

    /* Düzenleme modunda tüm grubu taşıyabilmen için */
    .edit-active { border: 2px dashed #00f2ea !important; }
</style>

<div id="canvas">
    <div id="host-cam" class="draggable resizable" style="top:50px; left:50px;">
        <img src="3333.jpeg" style="width:100%; border-radius:10px;">
    </div>

    <div id="guest-container" class="draggable" style="top:50px; right:50px;">
        </div>

    <div id="lion-box" class="draggable resizable" style="display: none;">
        <video id="lion-vid" style="width: 100%;"><source src="aslan.mp4"></video>
    </div>
</div>

<script>
    // Koltukları oluştururken "Request" yazısını küçük harf yaptık
    const container = document.getElementById('guest-container');
    for(let i=0; i<8; i++) {
        container.innerHTML += `
            <div id="slot${i}" class="slot">
                <span class="plus-icon">+</span>
                <span class="req-text">Request</span>
            </div>`;
    }

    // Artık tek tek slotları değil, #guest-container'ı sürüklüyoruz
    $(function() {
        $(".draggable").draggable({ disabled: true, snap: true });
        $(".resizable").resizable({ disabled: true });
    });
</script>

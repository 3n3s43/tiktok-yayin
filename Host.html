<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>TikTok Live - Professional Mode</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; position: relative; background: #000; }

        /* SÜRÜKLENEBİLİR ELEMANLAR */
        .draggable { position: absolute !important; cursor: default; border: 2px solid transparent; }
        /* Edit Modu Aktifken Çıkan Çizgiler */
        .ui-draggable-dragging, .edit-active { border: 2px dashed #00f2ea !important; background: rgba(0, 242, 234, 0.1); }

        /* 8'Lİ GRUP */
        #guest-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 5px;
            width: 300px;
            padding: 10px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .slot { 
            aspect-ratio: 1/1; 
            background: #1a1d23; 
            border-radius: 8px; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* İSTEDİĞİN KÜÇÜK YAZI: Request */
        .req-text { font-size: 12px; opacity: 0.6; margin-top: 5px; text-transform: capitalize; }
        .plus-icon { font-size: 24px; opacity: 0.4; }

        /* ASLAN VİDEOSU - TAM ORTA */
        #lion-box { width: 600px; height: 400px; display: none; z-index: 9999; }
        video { width: 100%; height: 100%; object-fit: contain; }

        /* HOST KAMERA ALANI */
        #host-cam { width: 450px; min-height: 250px; background: #111; border-radius: 15px; overflow: hidden; }
        #host-cam img { width: 100%; pointer-events: none; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam" class="draggable" style="top:50px; left:50px;">
        <img src="3333.jpeg"> 
    </div>

    <div id="guest-container" class="draggable" style="top:50px; right:50px;">
        </div>

    <div id="lion-box" class="draggable">
        <video id="lion-vid"><source src="aslan.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    const socket = io();

    // 8 Slotu oluştur
    const container = $('#guest-container');
    for(let i=0; i<8; i++) {
        container.append(`<div id="slot${i}" class="slot"><span class="plus-icon">+</span><span class="req-text">Request</span></div>`);
    }

    // Draggable Başlat (Kilitli şekilde)
    $(function() {
        $(".draggable").draggable({ containment: "#canvas" }).draggable("disable");
    });

    // KUMANDADAN GELEN EMİR
    socket.on('toggle_edit', (data) => {
        console.log("Edit Modu:", data.status);
        if(data.status) {
            $(".draggable").draggable("enable").addClass("edit-active");
            $("#

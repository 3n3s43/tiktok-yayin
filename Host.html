<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Host</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; font-family: 'Segoe UI', Roboto, sans-serif; color: white; }
        #canvas { width: 100vw; height: 100vh; position: relative; }
        
        #host-cam { width: 200px; height: 440px; position: absolute; top: 40px; left: 15px; border: 1.5px solid #3498db; border-radius: 4px; overflow: hidden; background: #111; }
        #host-cam img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Misafir Izgarası - Tam Bitişik */
        #guest-grid { width: 180px; height: 440px; position: absolute; top: 40px; left: 220px; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 0; background: transparent; }
        
        .slot { background: #000; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Boş Slot Görünümü */
        .plus-icon { color: #555; font-size: 26px; font-weight: 200; }
        .req-text { color: #666; font-size: 10px; margin-top: -2px; }

        /* --- DÜZELTME 1: PUAN PUNTOSU VE ELMAS --- */
        .slot-score { 
            position: absolute; top: 6px; left: 6px;
            font-size: 11px; font-weight: 800; /* Punto ve kalınlık artırıldı */
            display: flex; align-items: center; gap: 3px; 
            background: rgba(0,0,0,0.55); border-radius: 12px; 
            padding: 2px 8px; color: #fff; z-index: 5;
            letter-spacing: -0.2px;
        }
        .diamond-icon { 
            width: 12px; height: 12px; 
            background: radial-gradient(circle, #fff 10%, #64fcf9 40%, #00b4d8 90%); 
            border-radius: 50%; border: 1px solid rgba(255,255,255,0.6);
            box-shadow: 0 0 4px #64fcf9;
        }

        .guest-avatar { width: 56px; height: 56px; border-radius: 50%; object-fit: cover; margin-bottom: 5px; }

        /* --- DÜZELTME 2: İSİM VE ARTI (+) KİLİTLEME --- */
        .info-pill {
            position: absolute; bottom: 10px; left: 6px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(0,0,0,0.6); border-radius: 12px;
            padding: 0 6px 0 8px; width: 64px; height: 20px; /* Genişlik kilitli */
        }
        .guest-name { 
            font-size: 8.5px; font-weight: 700; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; 
            color: #eee; flex: 1; margin-right: 2px;
        }
        .mini-plus { font-size: 12px; font-weight: 900; color: #fff; flex-shrink: 0; }

        /* --- DÜZELTME 3: MUTE MİKROFON --- */
        .mic-pill {
            position: absolute; bottom: 10px; right: 6px;
            width: 20px; height: 20px;
            background: rgba(0,0,0,0.6); border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .mic-pill svg { width: 13px; height: 13px; fill: #fff; }

        #lion-overlay { position: absolute; top: 50px; left: 50px; width: 320px; height: 320px; display: none; z-index: 9999; }
        #lion-vid { width: 100%; height: 100%; object-fit: contain; }
    </style>
</head>
<body>

<div id="canvas">
    <div id="host-cam"><img src="3333.jpeg"></div>
    <div id="guest-grid"></div>
    <div id="lion-overlay">
        <video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video>
    </div>
</div>

<script>
    const socket = io();
    const slotScores = Array(8).fill(0);
    const grid = document.getElementById('guest-grid');
    const emptyHtml = `<div class="plus-icon">+</div><div class="req-text">Request</div>`;

    for(let i=0; i<8; i++) { grid.innerHTML += `<div class="slot" id="slot${i}">${emptyHtml}</div>`; }

    socket.on('execute_visual', (data) => {
        if (data.action === 'lion_trigger') {
            const v = document.getElementById('lion-vid');
            $("#lion-overlay").show();
            v.currentTime = 0; v.muted = false; v.play();
            slotScores[data.slot] += 29999;
            $(`#slot${data.slot} .slot-score span`).text((slotScores[data.slot]/1000).toFixed(1) + "K");
            v.onended = () => { $("#lion-overlay").hide(); };
        }

        if (data.action === 'manage_slot') {
            const el = document.getElementById("slot" + data.slot);
            if (data.name) {
                el.innerHTML = `
                    <div class="slot-score">
                        <div class="diamond-icon"></div>
                        <span>0.0K</span>
                    </div>
                    <img src="${data.avatar}" class="guest-avatar">
                    <div class="info-pill">
                        <div class="guest-name">${data.name.toUpperCase()}</div>
                        <div class="mini-plus">+</div>
                    </div>
                    <div class="mic-pill">
                        <svg viewBox="0 0 24 24"><path d="M19 11h-1.7c0 .74-.16 1.43-.43 2.05l1.23 1.23c.56-.98.9-2.09.9-3.28zm-4.02.17c0-.06.02-.11.02-.17V5c0-1.66-1.34-3-3-3S9 3.34 9 5v.17l5.98 6zm-1.15 5.18l-1.02-1.02c-.52.42-1.15.67-1.81.67-1.66 0-3-1.34-3-3h-2c0 2.49 1.81 4.58 4.21 4.91V21h2v-2.09c.65-.09 1.28-.3 1.85-.62l-1.23-1.23zm-9.35-12.2l1.27-1.27 15.89 15.89-1.27 1.27L4.48 4.15z"/></svg>
                    </div>`;
            } else { el.innerHTML = emptyHtml; }
        }
    });
</script>
</body>
</html>

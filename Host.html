<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <script src="https://code.jquery.com/jquery-3.6.0.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: white; }
        .draggable { position: absolute; cursor: default; }
        .edit-active { border: 2px dashed #00f2ea !important; cursor: move !important; }
        
        .slot { width: 150px; height: 150px; background: #1c2026; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #333; }
        .plus-icon { font-size: 40px; opacity: 0.5; }
        .req-text { font-size: 14px; opacity: 0.5; }
        
        #lion-box { width: 400px; height: 400px; z-index: 9999; display: none; }
        #host-cam { width: 400px; height: 500px; border: 1px solid #222; }
        #host-cam img { width: 100%; height: auto; }
    </style>
</head>
<body>
    <div id="canvas" style="width:100vw; height:100vh;">
        <div id="host-cam" class="draggable resizable"><img src="3333.jpeg"></div>
        <div id="slots-layer"></div>
        <div id="lion-box" class="draggable resizable"><video id="lion-vid" width="100%"><source src="aslan.mp4"></video></div>
    </div>

<script>
    const socket = io('https://tiktok-yayin.onrender.com');

    // Koltukları oluştur
    for(let i=0; i<8; i++) {
        $('#slots-layer').append(`<div id="slot${i}" class="draggable resizable slot" style="top:${i*50}px; left:500px;"><span class="plus-icon">+</span><span class="req-text">Request</span></div>`);
    }

    // Başlangıçta sürüklemeyi kapat
    $(function() {
        $(".draggable").draggable({ disabled: true });
        $(".resizable").resizable({ disabled: true, aspectRatio: true });
    });

    // Kumandadan gelen Düzenleme Modu
    socket.on('toggle_edit', (data) => {
        if(data.status) {
            $(".draggable").draggable("enable").addClass('edit-active');
            $(".resizable").resizable("enable");
        } else {
            $(".draggable").draggable("disable").removeClass('edit-active');
            $(".resizable").resizable("disable");
        }
    });

    socket.on('update_host', (data) => {
        const el = $(`#slot${data.slot}`);
        if(data.action === 'add') {
            el.html(`<img src="${data.avatar}" style="width:60%; border-radius:50%"><span style="margin-top:10px">${data.name}</span>`);
        } else {
            el.html(`<span class="plus-icon">+</span><span class="req-text">Request</span>`);
        }
    });

    socket.on('lion_trigger', () => {
        $("#lion-box").fadeIn();
        document.getElementById('lion-vid').play();
        document.getElementById('lion-vid').onended = () => $("#lion-box").fadeOut();
    });
</script>
</body>
</html>

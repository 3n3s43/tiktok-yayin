<style>
    /* ✅ OBS İÇİN SABİTLENMİŞ KONUMLAR */
    
    #host-cam { 
        width: 400px; height: 720px; 
        border: 3px solid #3498db; 
        position: absolute; 
        /* OBS'de görünecek sabit yer (Sol) */
        top: 50px; left: 30px; 
        background: #111; overflow: hidden;
    }

    #guest-grid { 
        position: absolute; 
        /* OBS'de görünecek sabit yer (Sağ) */
        top: 50px; right: 30px; 
        display: grid; 
        grid-template-columns: repeat(2, 1fr); 
        gap: 5px; 
        width: 240px; /* Kutuları senin için biraz daha küçülttüm */
    }

    .slot {
        aspect-ratio: 1/1; 
        background: rgba(20, 20, 20, 0.95); 
        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 6px; 
    }
</style>

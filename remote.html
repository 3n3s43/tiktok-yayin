<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>TikTok Live Remote - Pro</title>
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; font-family: sans-serif; color: #fff; padding: 10px; }
    .header { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: #1a1a2e; border-radius: 10px; margin-bottom: 10px; border: 1px solid #333; }
    .status { font-size: 11px; display: flex; align-items: center; gap: 5px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ff3b5c; }
    .dot.on { background: #00d4aa; box-shadow: 0 0 8px #00d4aa; }
    .panel { background: #1a1a2e; border-radius: 10px; padding: 15px; margin-bottom: 10px; }
    .row { display: flex; gap: 8px; margin-bottom: 10px; }
    input, select { background: #0d0d1a; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 8px; flex: 1; }
    .btn { background: #ff3b5c; color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: bold; width: 100%; cursor: pointer; }
    .btn:disabled { background: #555; cursor: not-allowed; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .card { background: #1a1a2e; border-radius: 8px; padding: 10px; border: 1px solid #333; position: relative; }
    .card.full { border-color: #ff3b5c; }
    .num { position: absolute; top: 5px; left: 5px; font-size: 10px; color: #888; }
    .info { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
    .avatar { width: 35px; height: 35px; border-radius: 50%; background: #333; object-fit: cover; }
    .nick { font-size: 11px; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #FFD700; }
    .score { font-size: 10px; color: #00d4aa; }
    .del { background: #333; color: #ccc; border: none; padding: 5px; border-radius: 4px; font-size: 10px; width: 100%; margin-top: 8px; cursor: pointer; }
    .gifts { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
    .gift-btn { background: #0d0d1a; border: 1px solid #333; padding: 8px; border-radius: 8px; text-align: center; cursor: pointer; }
    .gift-btn.active { border-color: #ff3b5c; background: rgba(255,59,92,0.1); }
  </style>
</head>
<body>

  <div class="header">
    <h1 style="font-size: 14px; color: #ff3b5c;">KUMANDA PANELI</h1>
    <div class="status">
      <div id="dot" class="dot"></div> 
      <span id="stat">Baglaniyor...</span>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <input type="text" id="userIn" placeholder="@kullanici_adi">
      <select id="seatIn" style="max-width: 90px;">
        <option value="0">Koltuk 1</option><option value="1">Koltuk 2</option>
        <option value="2">Koltuk 3</option><option value="3">Koltuk 4</option>
        <option value="4">Koltuk 5</option><option value="5">Koltuk 6</option>
        <option value="6">Koltuk 7</option><option value="7">Koltuk 8</option>
      </select>
    </div>
    <button id="addBtn" class="btn" onclick="addPlayer()">KOLTUGA OTURT</button>
  </div>

  <div class="grid" id="seatGrid"></div>

  <div class="panel" style="margin-top:10px;">
    <div class="gifts" id="giftGrid"></div>
    <div class="row" style="margin-top:10px;">
      <select id="target" style="flex:2;"><option value="">Koltuk Sec...</option></select>
      <button class="btn" style="flex:1;" onclick="sendG()">GONDER</button>
    </div>
  </div>

<script>
  const socket = io();
  let seats = Array(8).fill(null);
  let selGift = 'lion';
  const GIFTS = [
    { id: 'lion', e: '🦁', p: 29999 }, { id: 'crown', e: '👑', p: 10000 },
    { id: 'diamond', e: '💎', p: 5000 }, { id: 'fire', e: '🔥', p: 1000 },
    { id: 'star', e: '⭐', p: 500 }, { id: 'heart', e: '❤️', p: 100 },
    { id: 'rose', e: '🌹', p: 50 }, { id: 'rocket', e: '🚀', p: 2000 }
  ];

  async function addPlayer() {
    const user = document.getElementById('userIn').value.trim().replace('@', '');
    const idx = parseInt(document.getElementById('seatIn').value);
    const btn = document.getElementById('addBtn');
    
    if (!user) return alert('Kullanici adi girin!');
    btn.disabled = true;
    btn.innerText = "Araniyor...";

    // 1. ADIM: Profil Resmini Al
    const avatar = `https://unavatar.io/tiktok/${user}`;
    
    // 2. ADIM: Orijinal Nickname'i Denemeye Çaliş (Scraping)
    let finalNickname = user; 
    try {
      const res = await fetch(`https://unavatar.io/tiktok/${user}?json=true`);
      const data = await res.json();
      if (data.name && data.name !== user) {
        finalNickname = data.name; // İşte TikTok'taki emojili isim!
      }
    } catch (e) { console.log("Nickname cekilemedi."); }

    socket.emit('seatUpdate', {
      seatIndex: idx,
      userData: { username: finalNickname, avatar: avatar, score: 0 }
    });
    
    document.getElementById('userIn').value = '';
    btn.disabled = false;
    btn.innerText = "KOLTUGA OTURT";
  }

  function render() {
    const grid = document.getElementById('seatGrid');
    const target = document.getElementById('target');
    grid.innerHTML = '';
    target.innerHTML = '<option value="">Hediye Icin Sec...</option>';

    seats.forEach((s, i) => {
      if (s) {
        grid.innerHTML += `<div class="card full"><span class="num">${i + 1}</span><div class="info"><img class="avatar" src="${s.avatar}"><div style="min-width:0"><div class="nick">${s.username}</div><div class="score">${s.score} Puan</div></div></div><button class="del" onclick="clearSeat(${i})">KALDIR</button></div>`;
        target.innerHTML += `<option value="${i}">${i + 1}. ${s.username}</option>`;
      } else {
        grid.innerHTML += `<div class="card"><span class="num">${i + 1}</span><div style="color:#333;padding:10px 0;text-align:center;font-size:11px;">BOS</div></div>`;
      }
    });

    document.getElementById('giftGrid').innerHTML = GIFTS.map(g => `
      <div class="gift-btn ${selGift === g.id ? 'active' : ''}" onclick="selGift='${g.id}';render();">
        <div style="font-size:20px;">${g.e}</div>
        <div style="font-size:9px;color:#888;">${g.p}</div>
      </div>`).join('');
  }

  function clearSeat(idx) { socket.emit('seatClear', { seatIndex: idx }); }
  function sendG() {
    const idx = document.getElementById('target').value;
    if (idx === '') return alert('Koltuk sec!');
    const g = GIFTS.find(x => x.id === selGift);
    socket.emit('giftReceived', { seatIndex: parseInt(idx), giftType: g.id, points: g.p });
  }

  socket.on('connect', () => { document.getElementById('dot').className = 'dot on'; document.getElementById('stat').innerText = 'Bagli'; });
  socket.on('fullSync', d => { seats = d.seats; render(); });
  socket.on('seatUpdate', d => { seats[d.seatIndex] = d.userData; render(); });
  socket.on('seatClear', d => { seats[d.seatIndex] = null; render(); });
  socket.on('giftReceived', d => { if (seats[d.seatIndex]) { seats[d.seatIndex].score += d.points; render(); } });
  render();
</script>
</body>
</html>

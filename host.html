<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Tiktok Live Host - Pro Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        /* 📍 ANA OMURGA - DEĞİŞMEZ SİYAH ARKA PLAN */
        html, body { 
            margin: 0; padding: 0;
            background-color: #000000 !important; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            overflow: hidden; 
            width: 100vw; height: 100vh; 
        }
        
        /* 📍 SABİT KOORDİNATLAR */
        #guest-grid { 
            width: 180px; height: 440px; 
            position: absolute; top: 135px; left: 215px; 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            grid-template-rows: repeat(4, 1fr); 
            gap: 0px; background: #000000 !important; 
            box-sizing: border-box; z-index: 10;
        }

        .slot { 
            background: #000000 !important; 
            position: relative; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; overflow: hidden;
        }

        .plus-icon { color: #FFFFFF; font-size: 32px; font-weight: 200; line-height: 1; }
        .req-text { color: #FFFFFF; font-size: 11px; font-weight: 400; margin-top: -2px; }
        
        /* Skor Tabelası */
        .slot-score { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); border-radius: 20px; padding: 2px 8px; z-index: 15; }
        .score-val { font-size: 10px; color: #fff; font-weight: 600; }

        .guest-avatar { width: 58px; height: 58px; border-radius: 50%; border: 1.5px solid #333; object-fit: cover; z-index: 12; }
        
        /* 💎 SÜSLÜ NICKNAME BANDI (Geliştirildi) */
        .info-pill { 
            position: absolute; bottom: 8px; 
            background: rgba(0,0,0,0.85); 
            border-radius: 15px; padding: 2px 10px; 
            max-width: 88%; z-index: 15; 
            height: 20px; display: flex; align-items: center; justify-content: center;
            border: 0.5px solid rgba(255,255,255,0.1);
        }
        .guest-name { 
            font-size: 9px; color: #fff; font-weight: 600; 
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            display: inline-block;
        }
    </style>
</head>
<body>

    <div id="guest-grid">
        <script>
            for(let i=0; i<8; i++) {
                document.write(`<div class="slot" id="slot-${i}"><div class="plus-icon">+</div><div class="req-text">Request</div></div>`);
            }
        </script>
    </div>

    <script>
        const socket = io();
        let seats = Array(8).fill(null);

        // Nickname'i temizleme ve emoji desteği için yardımcı fonksiyon
        function formatNick(nick) {
            if(!nick) return "";
            return nick; // Emojileri tarayıcı zaten tanır, biz sadece taşmayı engelledik
        }

        function updateUI() {
            seats.forEach((seat, i) => {
                const slot = $(`#slot-${i}`);
                if (seat && seat.username) {
                    const displayScore = seat.score >= 1000 ? (seat.score/1000).toFixed(1)+'K' : (seat.score || 0);
                    
                    slot.html(`
                        <div class="slot-score"><span class="score-val">${displayScore}</span></div>
                        <img src="${seat.avatar || ''}" class="guest-avatar">
                        <div class="info-pill"><span class="guest-name">${formatNick(seat.username)}</span></div>
                    `);
                } else {
                    slot.html(`<div class="plus-icon">+</div><div class="req-text">Request</div>`);
                }
            });
        }

        socket.on('fullSync', (data) => { if(data && data.seats){ seats = data.seats; updateUI(); } });
        socket.on('seatUpdate', (data) => { seats[data.seatIndex] = data.userData; updateUI(); });
        socket.on('seatClear', (data) => { seats[data.seatIndex] = null; updateUI(); });
        socket.on('giftReceived', (data) => { 
            if(seats[data.seatIndex]) { 
                seats[data.seatIndex].score = (seats[data.seatIndex].score || 0) + data.points; 
                updateUI(); 
            } 
        });
    </script>
</body>
</html>

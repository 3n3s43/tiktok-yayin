<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Final Stable</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: transparent; font-family: Arial, sans-serif; display: flex; height: 100vh; width: 100vw; }
        #main-area { flex: 1.5; position: relative; border: 1px solid #222; margin: 10px; border-radius: 8px; }
        #guest-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }

        .slot {
            background: rgba(17, 17, 17, 0.9); border: 1px solid #ffffff; 
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            min-height: 100px;
        }

        /* ✅ SARI ÇERÇEVE ŞEFFAF YAPILDI */
        .slot-active { border-color: rgba(255, 255, 255, 0.1) !important; background: #0a0a0a; }
        .plus-icon { color: #fff; font-size: 30px; font-weight: 100; }
        .request-text { color: #fff; font-size: 10px; margin-top: 4px; opacity: 0.7; }
        
        /* ✅ PROFİL RESMİ SARI ÇERÇEVE ŞEFFAF YAPILDI */
        .guest-avatar { width: 65px; height: 65px; border-radius: 50%; border: 2px solid transparent; object-fit: cover; z-index: 1; margin-bottom: 5px; }

        .score-badge { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 4px; z-index: 10; }
        .points-display { color: #fff; font-size: 14px; font-weight: 400; }
        .custom-icon { width: 15px; height: 15px; border-radius: 50%; }
        .mini-lion-trigger { position: absolute; top: 8px; right: 8px; width: 38px; height: 38px; display: none; z-index: 10; }

        .slot-footer {
            position: absolute; bottom: 8px; left: 8px; right: 8px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(45, 45, 45, 0.9); padding: 4px 10px; border-radius: 20px; z-index: 5;
        }
        .guest-name { color: #fff; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; text-transform: uppercase; }
        .footer-controls { display: flex; align-items: center; gap: 8px; }

        .btn-plus { color: #fff; background: #555; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; }
        
        .mic-box { 
            width: 22px; height: 22px; 
            background: #555; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
        }

        #lion-overlay { position: fixed; bottom: 20px; left: 20px; display: none; z-index: 1000; pointer-events: none; }
        #lion-vid { width: 60%; max-width: 550px; }
        
        /* ✅ YANIP SÖNME HIZI 10 SANİYE YAPILDI */
        @keyframes miniLionBlink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="main-area"></div>
    <div id="guest-grid">
        <div class="slot" id="slot0"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot1"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot2"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot3"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot4"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot5"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot6"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
        <div class="slot" id="slot7"><span class="plus-icon">+</span><span class="request-text">Request</span></div>
    </div>

    <div id="lion-overlay"><video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video></div>

    <script>
        const socket = io('http://127.0.0.1:5001', { transports: ['websocket', 'polling'] });
        const overlay = document.getElementById('lion-overlay');
        const video = document.getElementById('lion-vid');
        let users = {};

        socket.on('execute_visual', (data) => {
            console.log("KOMUT GELDİ:", data);
            
            const name = data.name;
            const slotId = "slot" + data.slot;
            const el = document.getElementById(slotId);

            if (data.action === 'manage_slot' && el) {
                if (name && name !== "") {
                    users[name] = { score: 0, slotId: slotId };
                    el.classList.add('slot-active');
                    el.innerHTML = `
                        <div class="score-badge">
                            <img src="00.jpeg" class="custom-icon">
                            <span id="pts-${name}" class="points-display">0.0K</span>
                        </div>
                        <img src="3333.jpeg" class="mini-lion-trigger" id="mini-${name}">
                        <img src="${data.avatar}" class="guest-avatar">
                        <div class="slot-footer">
                            <span class="guest-name">${name}</span>
                            <div class="footer-controls">
                                <div class="btn-plus">+</div>
                                <div class="mic-box">
                                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                                        <line x1="1" y1="1" x2="23" y2="23"></line>
                                        <path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path>
                                        <path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path>
                                        <line x1="12" y1="19" x2="12" y2="23"></line>
                                        <line x1="8" y1="23" x2="16" y2="23"></line>
                                    </svg>
                                </div>
                            </div>
                        </div>`;
                } else {
                    el.classList.remove('slot-active');
                    el.innerHTML = `<span class="plus-icon">+</span><span class="request-text">Request</span>`;
                }
            }

            if (data.action === 'lion_effect' && users[name]) {
                users[name].score += 29999;
                const pSpan = document.getElementById(`pts-${name}`);
                if(pSpan) pSpan.innerText = (users[name].score / 1000).toFixed(1) + "K";
                
                const mini = document.getElementById(`mini-${name}`);
                if(mini) { 
                    mini.style.display = 'block'; 
                    mini.style.animation = 'miniLionBlink 10s infinite'; 
                }
                
                overlay.style.display = 'flex';
                video.currentTime = 0;
                video.play().catch(e => { console.log("Video hatası:", e)});
                video.onended = () => { overlay.style.display = 'none'; };
            }
        });

        socket.on('connect', () => { console.log("SUNUCUYA BAĞLANDI ✅"); });
    </script>
</body>
</html>

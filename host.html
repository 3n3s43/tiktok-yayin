<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Dubai King Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #000; font-family: Arial, sans-serif; display: flex; height: 100vh; width: 100vw; }
        #main-area { flex: 1.5; border: 1px solid #111; margin: 10px; border-radius: 8px; }
        #guest-grid { flex: 1; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: repeat(4, 1fr); gap: 10px; padding: 10px; box-sizing: border-box; }

        .slot {
            background: #000; border: 1px solid #222;
            border-radius: 12px; display: flex; flex-direction: column;
            align-items: center; justify-content: center; position: relative;
            overflow: hidden;
        }

        .bg-placeholder { display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .plus-icon { color: #fff; font-size: 30px; font-weight: 100; }
        .request-text { color: #fff; font-size: 10px; margin-top: 4px; opacity: 0.7; }

        .guest-avatar { width: 75px; height: 75px; border-radius: 50%; border: none; object-fit: cover; z-index: 2; }

        .score-badge { position: absolute; top: 10px; left: 10px; display: flex; align-items: center; gap: 4px; z-index: 10; }
        .points-display { color: #fff; font-size: 14px; font-weight: 300; }
        .custom-icon { width: 15px; height: 15px; border-radius: 50%; }
        .mini-lion-trigger { position: absolute; top: 8px; right: 8px; width: 38px; height: 38px; display: none; z-index: 10; }

        .slot-footer {
            position: absolute; bottom: 8px; left: 8px; right: 8px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(35, 35, 35, 0.9); padding: 5px 10px; border-radius: 20px; z-index: 5;
        }
        .guest-name { color: #fff; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
        .footer-controls { display: flex; align-items: center; gap: 8px; }
        .btn-plus-small { color: #fff; background: #444; width: 22px; height: 22px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .mic-box { width: 22px; height: 22px; background: #444; border-radius: 50%; display: flex; align-items: center; justify-content: center; }

        /* 🟢 ASLAN: SOL ALTTA VE DAHA BÜYÜK (450px) 🟢 */
        #lion-overlay { 
            position: fixed; 
            bottom: 20px; 
            left: 20px;  /* Sağdan sola çekildi */
            display: none; 
            z-index: 1000; 
            pointer-events: none; 
        }
        #lion-vid { 
            width: 450px; /* 300px'den 450px'e çıkarıldı */
            height: auto; 
        }
        
        @keyframes miniLionBlink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="main-area"></div>
    <div id="guest-grid">
        <script>
            for(let i=0; i<8; i++) {
                document.write(`
                <div class="slot" id="slot${i}">
                    <div id="placeholder-${i}" class="bg-placeholder">
                        <span class="plus-icon">+</span>
                        <span class="request-text">Request</span>
                    </div>
                    <div id="user-content-${i}" style="width:100%; height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center; position:absolute; top:0; left:0;"></div>
                </div>`);
            }
        </script>
    </div>

    <div id="lion-overlay"><video id="lion-vid" muted><source src="aslan.mp4" type="video/mp4"></video></div>

    <script>
        const socket = io('http://127.0.0.1:5001');
        const overlay = document.getElementById('lion-overlay');
        const video = document.getElementById('lion-vid');
        let users = {}; 

        socket.on('execute_visual', (data) => {
            if (data.action === 'manage_slot') {
                const name = data.name;
                const slotIdx = data.slot;
                const placeholder = document.getElementById("placeholder-" + slotIdx);
                const userContent = document.getElementById("user-content-" + slotIdx);

                if (!name || name.trim() === "") { 
                    userContent.innerHTML = "";
                    placeholder.style.display = "flex";
                    for(let u in users) { if(users[u].slotId == slotIdx) delete users[u]; }
                } else { 
                    users[name] = { score: 0, slotId: slotIdx };
                    placeholder.style.display = "none";
                    userContent.innerHTML = `
                        <div class="score-badge">
                            <img src="00.jpeg" class="custom-icon">
                            <span id="pts-${name}" class="points-display">0.0K</span>
                        </div>
                        <img src="3333.jpeg" class="mini-lion-trigger" id="mini-${name}">
                        <img src="https://i.pravatar.cc/150?u=${name}" class="guest-avatar">
                        <div class="slot-footer">
                            <span class="guest-name">${name}</span>
                            <div class="footer-controls">
                                <div class="btn-plus-small">+</div>
                                <div class="mic-box">
                                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><line x1="1" y1="1" x2="23" y2="23"></line><path d="M9 9v3a3 3 0 0 0 5.12 2.12M15 9.34V4a3 3 0 0 0-5.94-.6"></path><path d="M17 16.95A7 7 0 0 1 5 12v-2m14 0v2a7 7 0 0 1-.11 1.23"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
                                </div>
                            </div>
                        </div>`;
                }
            }

            if (data.action === 'lion_effect') {
                const targetName = data.name;
                if (users[targetName]) {
                    users[targetName].score += 29999;
                    const pText = document.getElementById(`pts-${targetName}`);
                    if(pText) pText.innerText = (users[targetName].score / 1000).toFixed(1) + "K";
                    
                    const mini = document.getElementById(`mini-${targetName}`);
                    if(mini) { mini.style.display = 'block'; mini.style.animation = 'miniLionBlink 1s infinite'; }

                    overlay.style.display = 'flex';
                    video.currentTime = 0;
                    video.play();
                    video.onended = () => { overlay.style.display = 'none'; };
                }
            }
            if (data.action === 'reset_all') { location.reload(); }
        });
    </script>
</body>
</html>

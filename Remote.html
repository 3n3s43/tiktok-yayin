<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mode 2 - Remote Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0b0d11; color: #fff; font-family: sans-serif; padding: 15px; }
        .card { background: #16191f; border-radius: 12px; padding: 20px; border: 1px solid #252932; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .slot-btn { background: #1c2028; border: 1px solid #2d323e; padding: 15px; border-radius: 10px; text-align: center; }
        button { border-radius: 6px; cursor: pointer; border: none; font-weight: bold; }
        .btn-main { background: #2d323e; color: #fff; padding: 10px; margin: 5px; }
        .btn-add { background: #00f2ea; color: #000; width: 100%; padding: 8px; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Remote Control</h3>
        <button class="btn-main" id="editBtn" onclick="sendEdit()">Edit Move: Off</button>
        <button class="btn-main" onclick="socket.emit('trigger_lion')">Play Lion</button>
        
        <div class="grid" id="remote-slots"></div>
    </div>

<script>
    const socket = io('https://tiktok-yayin.onrender.com');
    let editMode = false;

    function sendEdit() {
        editMode = !editMode;
        document.getElementById('editBtn').innerText = `Edit Move: ${editMode ? 'On' : 'Off'}`;
        socket.emit('toggle_edit', { status: editMode });
    }

    for(let i=0; i<8; i++) {
        document.getElementById('remote-slots').innerHTML += `
            <div class="slot-btn">
                <div style="font-size:12px; color:#666; margin-bottom:8px;">Empty</div>
                <button class="btn-add" onclick="addUser(${i})">Add TikTok</button>
            </div>`;
    }

    async function addUser(id) {
        const handle = prompt("TikTok Kullanıcı Adı Girin:");
        if(handle) {
            // TikTok resmini otomatik çekme simülasyonu
            const user = { name: handle, avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${handle}` };
            socket.emit('manage_slot', { slot: id, user: user });
        }
    }
</script>
</body>
</html>

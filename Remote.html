<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Remote</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-top: 20px; }
        .slot-btn { padding: 15px; background: #333; border: 2px solid #555; cursor: pointer; text-align: center; border-radius: 8px; }
        .slot-btn.active { border-color: #3498db; background: #2c3e50; }
        .controls { margin-top: 20px; background: #222; padding: 20px; border-radius: 8px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; margin: 5px; }
        .btn-blue { background: #3498db; color: white; }
        .btn-green { background: #27ae60; color: white; }
        .btn-orange { background: #f39c12; color: white; }
        .btn-red { background: #e74c3c; color: white; }
    </style>
</head>
<body>
    <h2>Orender Remote Control</h2>
    <div class="grid" id="slot-grid"></div>

    <div class="controls">
        <h3 id="selected-title">Slot Seçilmedi</h3>
        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
            <button class="btn-blue" onclick="joinUser()">Kullanıcı Oturt</button>
            <button class="btn-green" onclick="sendSmallGift()">Küçük Hediye (Asimetrik)</button>
            <button class="btn-orange" onclick="sendLion()">🦁 ASLAN GÖNDER (29.999K)</button>
            <button class="btn-red" onclick="removeUser()">Slotu Boşalt</button>
        </div>
    </div>

<script>
    const socket = io();
    let selectedSlot = null;

    for(let i=0; i<8; i++) {
        $('#slot-grid').append(`<div class="slot-btn" id="btn${i}" onclick="selectSlot(${i})">Slot ${i+1}</div>`);
    }

    function selectSlot(i) {
        selectedSlot = i;
        $('.slot-btn').removeClass('active');
        $(`#btn${i}`).addClass('active');
        $('#selected-title').text(`Slot ${i+1} Seçildi`);
    }

    function joinUser() {
        if(selectedSlot === null) return alert("Slot seç!");
        const name = prompt("İsim:");
        const avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
        socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: name, avatar: avatar });
    }

    function sendSmallGift() {
        if(selectedSlot === null) return alert("Slot seç!");
        const values = [1, 16, 4, 3, 5, 7];
        const randomVal = values[Math.floor(Math.random() * values.length)];
        socket.emit('execute_visual', { action: 'gift_trigger', slot: selectedSlot, gift_type: 'small', value: randomVal });
    }

    function sendLion() {
        if(selectedSlot === null) return alert("Slot seç!");
        socket.emit('execute_visual', { action: 'gift_trigger', slot: selectedSlot, gift_type: 'lion' });
    }

    function removeUser() {
        if(selectedSlot === null) return alert("Slot seç!");
        socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: null });
    }
</script>
</body>
</html>

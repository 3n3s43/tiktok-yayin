<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Orender Pro - Remote Control</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0b0d11; color: #fff; font-family: sans-serif; padding: 15px; text-align: center; }
        .card { background: #16191f; border-radius: 12px; padding: 20px; border: 1px solid #252932; max-width: 400px; margin: auto; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .slot-btn { background: #1c2028; border: 1px solid #2d323e; padding: 15px; border-radius: 10px; }
        button { border-radius: 6px; cursor: pointer; border: none; font-weight: bold; transition: 0.3s; }
        .btn-main { background: #2d323e; color: #fff; padding: 12px; margin: 5px; width: 45%; }
        .btn-lion { background: #ff9f43; color: #fff; box-shadow: 0 4px 15px rgba(255,159,67,0.3); }
        .btn-add { background: #00f2ea; color: #000; width: 100%; padding: 8px; margin-top: 5px; }
        .active-edit { background: #eb4d4b !important; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🦁 Reji Paneli</h3>
        <div style="display:flex; justify-content: center;">
            <button class="btn-main" id="editBtn" onclick="sendEdit()">Düzenle: Kapalı</button>
            <button class="btn-main btn-lion" onclick="triggerLion()">ASLAN PATLAT!</button>
        </div>
        
        <div class="grid" id="remote-slots"></div>
    </div>

<script>
    const socket = io(); 
    let editMode = false;

    // Düzenleme Modu (Sürükle-Bırak-Boyutlandır)
    function sendEdit() {
        editMode = !editMode;
        const btn = document.getElementById('editBtn');
        btn.innerText = `Düzenle: ${editMode ? 'Açık' : 'Kapalı'}`;
        btn.classList.toggle('active-edit', editMode);
        socket.emit('toggle_edit', { status: editMode });
    }

    // ✅ ASLAN TETİKLEME (Host'taki execute_visual'a göre uyarlandı)
    function triggerLion() {
        socket.emit('execute_visual', { action: 'lion_trigger' });
    }

    // 8 Slot oluştur
    const slotContainer = document.getElementById('remote-slots');
    for(let i=0; i<8; i++) {
        slotContainer.innerHTML += `
            <div class="slot-btn">
                <div id="status-${i}" style="font-size:11px; color:#666; margin-bottom:5px;">Slot ${i+1} Boş</div>
                <button class="btn-add" onclick="addUser(${i})">TikTok Ekle</button>
            </div>`;
    }

    // ✅ SLOT YÖNETİMİ (Host'taki execute_visual'a göre uyarlandı)
    async function addUser(id) {
        const handle = prompt("TikTok Kullanıcı Adı:");
        if(handle) {
            const avatarUrl = `https://api.dicebear.com/7.x/avataaars/svg?seed=${handle}`;
            socket.emit('execute_visual', { 
                action: 'manage_slot',
                slot: id, 
                name: handle, 
                avatar: avatarUrl 
            });
            document.getElementById(`status-${id}`).innerText = handle;
            document.getElementById(`status-${id}`).style.color = "#00f2ea";
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Mode 2 - Remote Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #0f1115; color: #e1e1e1; font-family: 'Inter', sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: #15181f; border-radius: 12px; padding: 20px; border: 1px solid #252932; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 25px; }
        button { background: #252932; color: #fff; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; }
        button.active { background: #00f2ea; color: #000; }
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .slot-box { background: #1c2028; border: 1px solid #2d323e; border-radius: 10px; padding: 15px; text-align: center; min-height: 120px; }
        .user-info { display: flex; flex-direction: column; align-items: center; }
        .user-info img { width: 50px; height: 50px; border-radius: 50%; margin-bottom: 8px; border: 2px solid #00f2ea; }
        .action-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px; }
        .btn-kick { background: #351c1c; color: #ff5f5f; }
        .btn-lion { background: #2d323e; grid-column: span 2; display: flex; align-items: center; justify-content: center; gap: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h3>Remote Control</h3>
        <div class="btn-group">
            <button onclick="toggleEdit(this)">Edit Move: Off</button>
            <button>Save Layout</button>
            <button onclick="socket.emit('trigger_lion')">General Lion</button>
        </div>
        <div class="slot-grid" id="slot-container"></div>
    </div>

    <script>
        const socket = io();
        let editMode = false;
        let slots = Array(8).fill(null);

        function toggleEdit(btn) {
            editMode = !editMode;
            btn.innerText = `Edit Move: ${editMode ? 'On' : 'Off'}`;
            btn.classList.toggle('active');
            socket.emit('toggle_edit', { status: editMode });
        }

        function renderSlots() {
            const container = document.getElementById('slot-container');
            container.innerHTML = '';
            slots.forEach((user, i) => {
                container.innerHTML += `
                    <div class="slot-box">
                        ${user ? `
                            <div class="user-info">
                                <img src="${user.avatar}">
                                <span>${user.name}</span>
                                <div class="action-btns">
                                    <button class="btn-kick" onclick="updateSlot(${i}, null)">Kick</button>
                                    <button style="background:#252932">Donate</button>
                                    <button class="btn-lion" onclick="sendLion(${i})">🦁 Lion Gift</button>
                                </div>
                            </div>
                        ` : `
                            <div style="color:#444; margin-bottom:10px">Empty</div>
                            <button onclick="addUser(${i})" style="background:#00f2ea; color:#000; width:100%">Add</button>
                        `}
                    </div>`;
            });
        }

        async function addUser(id) {
            const handle = prompt("Enter TikTok handle:");
            if(!handle) return;
            const res = await fetch(`/get_tiktok/${handle}`);
            const data = await res.json();
            slots[id] = data;
            updateSlot(id, data);
        }

        function updateSlot(id, data) {
            slots[id] = data;
            socket.emit('manage_slot', { slot: id, user: data });
            renderSlots();
        }

        function sendLion(id) {
            socket.emit('trigger_lion', { target: id });
        }

        renderSlots();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mylevelupo - Profesyonel Kumanda</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; max-width: 400px; margin: 20px auto; }
        .slot-btn { padding: 25px 10px; background: #1a1a1a; border: 2px solid #333; border-radius: 12px; color: #aaa; cursor: pointer; transition: 0.3s; font-weight: bold; }
        .slot-btn.active { border-color: #00f2ff; background: #002b2e; color: white; box-shadow: 0 0 15px rgba(0,242,255,0.3); }
        .controls { display: none; margin-top: 20px; background: #1a1a1a; padding: 25px; border-radius: 20px; border-top: 3px solid #00f2ff; }
        .btn { width: 100%; padding: 18px; margin: 8px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-gift { background: #f1c40f; color: #000; }
        .btn-lion { background: #e67e22; color: white; border: 2px solid #ffcc00; }
        #status-bar { background: #222; color: #00f2ff; padding: 8px; border-radius: 5px; margin-bottom: 15px; font-size: 12px; font-family: monospace; }
    </style>
</head>
<body>
    <h2>Koltuk Kontrol Paneli</h2>
    <div id="status-bar">Sistem Hazır ✅</div>
    <div class="grid" id="slot-grid"></div>
    <div id="control-panel" class="controls">
        <h3 id="selected-title" style="margin-top:0; color:#00f2ff;">Seçim Yapın</h3>
        <button class="btn btn-green" onclick="manageUser()">👤 TikTok'tan Bul & Oturt</button>
        <button class="btn btn-red" onclick="removeUser()">❌ Koltuğu Boşalt</button>
        <hr style="border: 0.5px solid #333; margin: 20px 0;">
        <button class="btn btn-gift" onclick="sendGift(100)">💎 +100 Puan Ver</button>
        <button class="btn btn-lion" onclick="sendGift('lion')">🦁 ASLAN GÖNDER (29.9K)</button>
    </div>

    <script>
        const socket = io();
        let selectedSlot = null;
        for(let i=0; i<8; i++) {
            let btn = document.createElement('button');
            btn.className = 'slot-btn'; btn.innerText = `${i+1}. KOLTUK`;
            btn.onclick = () => {
                selectedSlot = i;
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('control-panel').style.display = 'block';
                document.getElementById('selected-title').innerText = `${i + 1}. Koltuk`;
            };
            document.getElementById('slot-grid').appendChild(btn);
        }

        async function manageUser() {
            if (selectedSlot === null) return;
            let username = prompt("TikTok kullanıcı adını yazın (@ olmadan):");
            if (!username) return;
            username = username.trim().replace('@', '');
            document.getElementById('status-bar').innerText = "⌛ Aranıyor...";
            try {
                const response = await fetch(`https://www.tiktok.com/oembed?url=https://www.tiktok.com/@${username}`);
                const result = await response.json();
                if (result.author_name) {
                    socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, username: username, name: result.author_name, avatar: result.thumbnail_url });
                    document.getElementById('status-bar').innerText = "✅ Oturtuldu!";
                }
            } catch (e) {
                socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, username: username, name: username, avatar: "" });
                document.getElementById('status-bar').innerText = "⚠️ Manuel Eklendi!";
            }
        }

        function removeUser() {
            if (selectedSlot === null) return;
            socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: null });
            document.getElementById('status-bar').innerText = "🧹 Koltuk Sıfırlandı";
        }

        function sendGift(val) {
            if (selectedSlot === null) return;
            socket.emit('execute_visual', { action: 'gift_trigger', slot: selectedSlot, gift_type: val === 'lion' ? 'lion' : 'normal', value: val === 'lion' ? 29999 : val });
        }
    </script>
</body>
</html>

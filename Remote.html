<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mylevelupo Remote - Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; margin: 0; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 400px; margin: 15px auto; }
        .slot-btn { padding: 20px; background: #1a1a1a; border: 2.2px solid #333; border-radius: 12px; color: #aaa; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
        .slot-btn.active { border-color: #00f2ff; background: #002b2e; color: white; box-shadow: 0 0 10px rgba(0,242,255,0.3); }
        .controls { display: none; margin-top: 15px; background: #1a1a1a; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        .btn { width: 100%; padding: 15px; margin: 6px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        #status-bar { background: #222; color: #00f2ff; padding: 12px; border-radius: 8px; margin-bottom: 10px; font-size: 13px; font-weight: bold; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="status-bar">SİSTEM HAZIR ✅</div>

    <div class="grid" id="slot-grid"></div>

    <div id="control-panel" class="controls">
        <h3 id="selected-title" style="margin-top:0; color:#00f2ff;">Koltuk Seçin</h3>
        
        <button class="btn" style="background:#2ecc71; color:white;" onclick="manageUser()">👤 TIKTOK'TAN OTURT</button>
        <button class="btn" style="background:#e74c3c; color:white;" onclick="removeUser()">❌ KOLTUĞU BOŞALT</button>
        
        <div style="margin:15px 0; border-top:1px solid #333; padding-top:15px;">
            <button class="btn" style="background:#e67e22; color:white;" onclick="sendGift('lion')">🦁 ASLAN GÖNDER (29.9K)</button>
            <button class="btn" style="background:#f1c40f; color:black;" onclick="sendGift(100)">💎 +100 PUAN EKLE</button>
        </div>
    </div>

    <script>
        const socket = io();
        let selectedSlot = null;

        // 8 Koltuk Oluşturucu
        for(let i=0; i<8; i++) {
            let btn = document.createElement('button');
            btn.className = 'slot-btn'; 
            btn.innerText = `${i+1}. KOLTUK`;
            btn.onclick = () => {
                selectedSlot = i;
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('control-panel').style.display = 'block';
                document.getElementById('selected-title').innerText = `${i + 1}. KOLTUK SEÇİLİ`;
            };
            document.getElementById('slot-grid').appendChild(btn);
        }

        // TikTok'tan Veri Çekme ve Oturtma
        async function manageUser() {
            if (selectedSlot === null) return;
            let user = prompt("TikTok Kullanıcı Adı Girin (Örn: enes):");
            if (!user) return;
            
            user = user.trim().replace('@', '');
            const status = document.getElementById('status-bar');
            status.innerText = "⌛ TIKTOK VERİSİ ARANIYOR...";

            try {
                // TikTok oEmbed üzerinden profil bilgilerini yakala
                const response = await fetch(`https://www.tiktok.com/oembed?url=https://www.tiktok.com/@${user}`);
                const result = await response.json();
                
                if (result.author_name) {
                    // Linki temizliyoruz: Sondaki ?v=... gibi çöp parametreleri silerek saf resmi alıyoruz
                    let rawAvatar = result.thumbnail_url ? result.thumbnail_url.split('?')[0] : "";
                    
                    socket.emit('execute_visual', { 
                        action: 'manage_slot', 
                        slot: selectedSlot, 
                        name: result.author_name, 
                        avatar: rawAvatar 
                    });
                    status.innerText = `✅ ${result.author_name} OTURTULDU!`;
                } else {
                    throw new Error("Veri yok");
                }
            } catch (e) {
                // Eğer TikTok veriyi vermezse (hata/blok), manuel nick ile oturt
                socket.emit('execute_visual', { 
                    action: 'manage_slot', 
                    slot: selectedSlot, 
                    name: user.toUpperCase(), 
                    avatar: "" 
                });
                status.innerText = "⚠️ MANUEL EKLENDİ (PROFİL YOK)";
            }
        }

        // Koltuğu Temizle
        function removeUser() {
            if (selectedSlot === null) return;
            socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: null });
            document.getElementById('status-bar').innerText = "❌ KOLTUK BOŞALTILDI";
        }

        // Hediye/Puan Gönder
        function sendGift(val) {
            if (selectedSlot === null) return;
            socket.emit('execute_visual', { 
                action: 'gift_trigger', 
                slot: selectedSlot, 
                gift_type: val === 'lion' ? 'lion' : 'normal', 
                value: val === 'lion' ? 29999 : val 
            });
            document.getElementById('status-bar').innerText = `💎 PUAN GÖNDERİLDİ: +${val === 'lion' ? '29.9K' : val}`;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Mylevelupo - Kumanda</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 400px; margin: auto; }
        .slot-btn { padding: 15px; background: #1e1e1e; border: 2px solid #333; color: white; border-radius: 8px; cursor: pointer; }
        .slot-btn.active { border-color: #00f2ff; background: #1a2a2d; }
        .controls { display: none; margin-top: 20px; }
        .btn { width: 80%; padding: 12px; margin: 5px; border-radius: 5px; font-weight: bold; cursor: pointer; border: none; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-gift { background: #f1c40f; color: black; }
    </style>
</head>
<body>
    <h2>Koltuk Seçimi</h2>
    <div id="alert-box" style="display:none; background:green; padding:10px;"></div>
    <div class="grid" id="grid"></div>

    <div id="control-panel" class="controls">
        <h3 id="slot-name">Slot Seç</h3>
        <button class="btn btn-green" onclick="manageUser()">👤 TikTok'tan Bul & Oturt</button>
        <button class="btn btn-red" onclick="removeUser()">❌ Koltuğu Boşalt</button>
        <button class="btn btn-gift" onclick="sendGift(100)">💎 +100 Puan</button>
    </div>

    <script>
        const socket = io();
        let selectedSlot = null;

        for(let i=0; i<8; i++) {
            let b = document.createElement('button');
            b.className = 'slot-btn'; b.innerText = `${i+1}. Koltuk`;
            b.onclick = () => {
                selectedSlot = i;
                document.querySelectorAll('.slot-btn').forEach(x => x.classList.remove('active'));
                b.classList.add('active');
                document.getElementById('control-panel').style.display = 'block';
            };
            document.getElementById('grid').appendChild(b);
        }

        function manageUser() {
            let user = prompt("TikTok Kullanıcı Adı (@ olmadan):");
            if(user) socket.emit('execute_visual', {action:'manage_slot', slot:selectedSlot, username:user});
        }

        function removeUser() {
            socket.emit('execute_visual', {action:'manage_slot', slot:selectedSlot, name:null});
        }

        function sendGift(v) {
            socket.emit('execute_visual', {action:'gift_trigger', slot:selectedSlot, value:v});
        }
    </script>
</body>
</html>

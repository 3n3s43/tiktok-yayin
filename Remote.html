<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remote</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; text-align: center; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; max-width: 400px; margin: 20px auto; }
        .slot-btn { padding: 20px; background: #1a1a1a; border: 2px solid #333; border-radius: 10px; color: #aaa; cursor: pointer; }
        .slot-btn.active { border-color: #00f2ff; background: #002b2e; color: white; }
        .controls { display: none; margin-top: 20px; background: #1a1a1a; padding: 20px; border-radius: 15px; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-green { background: #2ecc71; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        #status-bar { background: #222; color: #00f2ff; padding: 10px; border-radius: 5px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="status-bar">Sistem Hazır</div>
    <div class="grid" id="slot-grid"></div>
    <div id="control-panel" class="controls">
        <h3 id="selected-title">Koltuk Seçin</h3>
        <button class="btn btn-green" onclick="manageUser()">👤 TikTok'tan Oturt</button>
        <button class="btn btn-red" onclick="removeUser()">❌ Boşalt</button>
        <hr style="border:0.5px solid #333; margin:10px 0;">
        <button class="btn" style="background:#e67e22; color:white;" onclick="sendGift('lion')">🦁 ASLAN GÖNDER</button>
    </div>

    <script>
        const socket = io();
        let selectedSlot = null;

        for(let i=0; i<8; i++) {
            let btn = document.createElement('button');
            btn.className = 'slot-btn'; btn.innerText = `${i+1}. KOLTUK`;
            btn.onclick = () => {
                selectedSlot = i;
                document.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById('control-panel').style.display = 'block';
                document.getElementById('selected-title').innerText = `${i+1}. Koltuk`;
            };
            document.getElementById('slot-grid').appendChild(btn);
        }

        async function manageUser() {
            if (selectedSlot === null) return;
            let username = prompt("Kullanıcı Adı:");
            if (!username) return;
            username = username.trim().replace('@', '');
            try {
                const response = await fetch(`https://www.tiktok.com/oembed?url=https://www.tiktok.com/@${username}`);
                const result = await response.json();
                if (result.author_name) {
                    socket.emit('execute_visual', { 
                        action: 'manage_slot', 
                        slot: selectedSlot, 
                        name: result.author_name, 
                        avatar: result.thumbnail_url 
                    });
                }
            } catch (e) {
                socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: username, avatar: "" });
            }
        }

        function removeUser() {
            socket.emit('execute_visual', { action: 'manage_slot', slot: selectedSlot, name: null });
        }

        function sendGift(val) {
            socket.emit('execute_visual', { action: 'gift_trigger', slot: selectedSlot, gift_type: val === 'lion' ? 'lion' : 'normal', value: 29999 });
        }
    </script>
</body>
</html>

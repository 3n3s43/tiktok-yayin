<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orender Remote - Professional</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
        :root { --bg: #0d0f14; --card: #16181d; --btn-gray: #24272e; --accent: #3498db; --donate: #bd4a00; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .header-title { font-size: 18px; font-weight: bold; margin-bottom: 2px; }
        .sub-text { color: #666; font-size: 11px; margin-bottom: 15px; }
        .top-nav { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 15px; }
        .nav-btn { background: var(--btn-gray); border: none; color: #fff; padding: 10px 12px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 500; }
        .setting-item { border-bottom: 1px solid #1f2229; display: flex; justify-content: space-between; padding: 12px 0; font-size: 14px; cursor: pointer; }
        .slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .slot-box { background: var(--card); border-radius: 10px; padding: 8px; min-height: 65px; border: 1px solid #222; display: flex; flex-direction: column; justify-content: center; }
        .btn-add-large { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid #333; width: 100%; padding: 12px; border-radius: 8px; font-size: 14px; cursor: pointer; font-weight: bold; }
        .user-card { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .avatar { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--accent); }
        .username { font-size: 12px; font-weight: bold; }
        .action-row { display: flex; gap: 5px; }
        .btn-kick { background: var(--btn-gray); color: #fff; flex: 1; padding: 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-donate { background: var(--donate); color: #fff; flex: 1.5; padding: 10px; border-radius: 6px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
        .gift-box { background: rgba(52, 152, 219, 0.15); padding: 8px; border-radius: 6px; margin-top: 6px; display: flex; align-items: center; justify-content: center; gap: 5px; font-size: 13px; cursor: pointer; border: 1px solid rgba(52, 152, 219, 0.4); font-weight: bold; }
    </style>
</head>
<body>
    <div class="header-title">Remote Control</div>
    <div class="sub-text">Send commands to the host tab.</div>
    <div class="top-nav">
        <button class="nav-btn">Close 8-seat room</button>
        <button class="nav-btn" onclick="toggleMove()">Edit Move</button>
        <button class="nav-btn" onclick="window.open('/host.html', '_blank')">Open host tab</button>
    </div>
    <div class="slot-grid" id="slotContainer"></div>

<script>
    const socket = io({ transports: ['websocket'] });
    const slots = Array(8).fill(null);

    function renderSlots() {
        const container = document.getElementById('slotContainer');
        container.innerHTML = '';
        slots.forEach((user, i) => {
            if (!user) {
                container.innerHTML += `<div class="slot-box"><button class="btn-add-large" onclick="addUser(${i})">Add</button></div>`;
            } else {
                container.innerHTML += `
                    <div class="slot-box" style="border-color: var(--accent);">
                        <div class="user-card"><img src="${user.avatar}" class="avatar"><div class="username">${user.name}</div></div>
                        <div class="action-row">
                            <button class="btn-kick" onclick="removeUser(${i})">Kick</button>
                            <button class="btn-donate">Donate</button>
                        </div>
                        <div class="gift-box" onclick="triggerLion(${i})">🦁 Lion Gift</div>
                    </div>`;
            }
        });
    }

    function triggerLion(slotId) {
        socket.emit('execute_visual', { action: 'lion_trigger', slot: slotId });
    }

    function addUser(id) {
        const name = prompt("Kullanıcı Adı:");
        if (name) {
            const avatar = `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
            slots[id] = { name, avatar };
            socket.emit('execute_visual', { action: 'manage_slot', slot: id, name, avatar });
            renderSlots();
        }
    }

    function removeUser(id) {
        slots[id] = null;
        socket.emit('execute_visual', { action: 'manage_slot', slot: id, name: null });
        renderSlots();
    }

    renderSlots();
</script>
</body>
</html>
